<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>tic-tac-toe</title>

   <!-- STYLESHEETS -->
   <link rel="stylesheet" href="styles/reset.css">
   <link rel="stylesheet" href="styles/style.css">
</head>

<body>

   <!-- HEADER -->
   <header class="header">
      <h1 class="title">Tic-Tac-Toe Game</h1>
   </header>

   <!-- MAIN -->
   <main class="main">
      <section class="select_mark">
         <p class="mark_text">Choose your mark:</p>
         <button class="mark_x">X</button>
         <button class="mark_o">O</button>
      </section>
      <section class="game_board">
         <button id="1" value="1"></button><button id="2" value="2"></button><button id="3" value="3"></button>
         <button id="4" value="4"></button><button id="5" value="5"></button><button id="6" value="6"></button>
         <button id="7" value="7"></button><button id="8" value="8"></button><button id="9" value="9"></button>
      </section>
   </main>

   <!-- FOOTER -->
   <footer class="footer">
      <p class="copyright">Darian Toledo ©️ 2024</p>
   </footer>

   <!-- SCRIPTS -->
   <script src="scripts/main.js"></script>
</body>

</html>
